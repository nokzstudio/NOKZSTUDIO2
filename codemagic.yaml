workflows:
  android-release:
    name: Android Release Signed
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - keystore_credentials
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Install dependencies
        script: |
          npm ci --prefer-offline

      - name: Build Web Assets
        script: |
          npm run build          # ← Ini yang ditambahkan

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build Signed Release APK
        script: |
          cd android
          
          # Inject signing
          echo "android.injected.signing.store.file=$CM_KEYSTORE" >> gradle.properties
          echo "android.injected.signing.store.password=$CM_KEYSTORE_PASSWORD" >> gradle.properties
          echo "android.injected.signing.key.alias=$CM_KEY_ALIAS" >> gradle.properties
          echo "android.injected.signing.key.password=$CM_KEY_PASSWORD" >> gradle.properties
          
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk