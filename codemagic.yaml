workflows:
  android-build:
    name: Android Build

    environment:
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build React app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk